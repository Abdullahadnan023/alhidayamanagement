<!DOCTYPE html>
<html>
<head>
<title>Math Expression Evaluator</title>
<script>
function evaluateExpression() {
    const expression = document.getElementById("expression").value;

    const validPattern = /^[0-9+\-*/().\s]+$/;

    if (!validPattern.test(expression)) {
        document.getElementById("result").textContent = "Invalid characters in expression.";
        return;
    }

    try {
        const result = eval(expression);
        document.getElementById("result").textContent = "Result: " + result;
    } catch (error) {
        document.getElementById("result").textContent = "Invalid expression or operation.";
    }
}
</script>
</head>
<body>

<h2>Math Expression Evaluator</h2>

<form onsubmit="event.preventDefault(); evaluateExpression();">
    Enter a mathematical expression:
    <input type="text" id="expression">
    <input type="button" value="Evaluate" onclick="evaluateExpression()">
</form>

<p id="result"></p>

</body>
</html>
